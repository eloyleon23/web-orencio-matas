<section class="contact-section" id="contacto" aria-labelledby="contacto-title">
  <div class="container contact-section__inner">
    <div class="contact-info">
      <p class="section-heading__eyebrow">CONTACTO</p>
      <h2 id="contacto-title">Nueva ubicación</h2>

      <div class="contact-info__list">
        <a class="contact-info__item" href="https://www.google.com/maps/search/?api=1&query=Av.%20Alfred%20Nobel%2C%202%2C%2013005%20Ciudad%20Real">
          <span aria-hidden="true">⌖</span>
          <strong>Av. Alfred Nobel, 2<br />13005 Ciudad Real</strong>
        </a>
        <a class="contact-info__item" href="tel:+34926221217">
          <span aria-hidden="true">☎</span>
          <strong>926 221 217</strong>
        </a>
        <a class="contact-info__item" href="mailto:correo@orenciomatas.es">
          <span aria-hidden="true">✉</span>
          <strong>correo@orenciomatas.es</strong>
        </a>
        <div class="contact-info__item">
          <span aria-hidden="true">◷</span>
          <strong>Lunes a Viernes<br />9:00 – 14:00 y 16:30 – 19:30<br />Sábados: 9:00 – 13:00<br />Domingos: Cerrado</strong>
        </div>
      </div>

      <div class="map-placeholder" aria-label="Placeholder de Google Maps">
        <span class="map-placeholder__pin" aria-hidden="true">⌖</span>
        <strong>Av. Alfred Nobel, 2</strong>
        <p>Ciudad Real</p>
        <a href="https://www.google.com/maps/search/?api=1&query=Av.%20Alfred%20Nobel%2C%202%2C%2013005%20Ciudad%20Real">CÓMO LLEGAR →</a>
      </div>
    </div>

    <form class="quote-form" action="#" method="post">
      <h2>SOLICÍTANOS TU PRESUPUESTO</h2>
      <label>
        <span>Nombre</span>
        <input class="form-input" type="text" name="nombre" autocomplete="name" placeholder="Tu nombre" />
      </label>
      <label>
        <span>Teléfono</span>
        <input class="form-input" type="tel" name="telefono" autocomplete="tel" placeholder="Tu teléfono" />
      </label>
      <label>
        <span>Email</span>
        <input class="form-input" type="email" name="email" autocomplete="email" placeholder="tu@email.com" />
      </label>
      <label>
        <span>Mensaje</span>
        <textarea class="form-input" name="mensaje" rows="5" placeholder="Cuéntanos qué necesitas"></textarea>
      </label>
      <button class="btn-primary" type="submit">ENVIAR SOLICITUD →</button>
    </form>
  </div>
</section>
